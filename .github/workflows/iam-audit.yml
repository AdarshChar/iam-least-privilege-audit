name: IAM Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  iam-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -no-color
        continue-on-error: true

      - name: Install checkov
        run: pip install checkov

      - name: Run checkov scan
        id: checkov
        run: |
          checkov -d . --framework terraform --output cli --soft-fail
        continue-on-error: true

      - name: Install boto3
        run: pip install boto3

      - name: Run IAM audit script
        id: audit
        run: |
          python audit.py
        continue-on-error: true

      - name: Check for critical violations
        id: violations
        run: |
          python - <<'EOF'
          import json
          import sys
          import os

          violations = []

          # Check terraform files for dangerous policies
          import glob
          for filepath in glob.glob('**/*.json', recursive=True):
              try:
                  with open(filepath) as f:
                      content = f.read()
                  if any(bad in content for bad in [
                      'AdministratorAccess',
                      'PowerUserAccess',
                      '"*"'
                  ]):
                      # Skip the workflow file itself and node_modules
                      if '.github' not in filepath:
                          violations.append(f"CRITICAL: {filepath} contains overpermissive policy")
              except:
                  pass

          if violations:
              print("VIOLATIONS FOUND:")
              for v in violations:
                  print(f"  {v}")
              sys.exit(1)
          else:
              print("No critical violations found")
          EOF

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## FrazyCorp IAM Security Audit Results
            
            ### Checkov Scan
            ${{ steps.checkov.outcome == 'success' && 'Passed' || 'Issues found - check logs' }}
            
            ### IAM Audit Script  
            ${{ steps.audit.outcome == 'success' && 'Completed successfully' || 'Failed - check logs' }}
            
            ### Critical Violations Check
            ${{ steps.violations.outcome == 'success' && 'No critical violations found' || 'BLOCKED: Critical violations detected - see logs' }}
            
            > Pipeline will fail if any policy grants AdministratorAccess, PowerUserAccess, or wildcard permissions
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })